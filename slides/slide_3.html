<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Top Navigation -->
<header class="z-50 flex items-center justify-between px-10 py-6">
<div class="flex items-center gap-3">
<div class="size-6 text-primary">

</div>

<nav class="flex items-center gap-10">

<button class="bg-primary/10 border border-primary/20 text-primary px-5 py-2 rounded-lg text-xs font-bold uppercase tracking-widest hover:bg-primary/20 transition-all">

</div>

<p class="text-slate-500 text-[10px] uppercase tracking-tighter">Sample Intake Protocol</p>
</div>
</div>
<!-- Step 2 -->
<div class="flex flex-col items-center group">
<div class="glass-chip size-16 rounded-full flex items-center justify-center mb-6 group-hover:border-primary/50 transition-colors">

<p class="text-slate-500 text-[10px] uppercase tracking-tighter">Pattern Recognition</p>
</div>
</div>
<!-- Step 4 -->
<div class="flex flex-col items-center group">
<div class="glass-chip size-16 rounded-full flex items-center justify-center mb-6 group-hover:border-primary/50 transition-colors">

</div>

<div class="absolute top-0 right-0 w-1/3 h-1/3 bg-primary/5 blur-[120px] rounded-full -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
